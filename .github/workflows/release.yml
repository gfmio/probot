name: Release
on:
  push:
    branches:
      - master
      - next
      - beta
      - "*.x"

# These are recommended by the semantic-release docs: https://github.com/semantic-release/npm#npm-provenance
permissions:
  contents: write # to be able to publish a GitHub release
  issues: write # to be able to comment on released issues
  pull-requests: write # to be able to comment on released pull requests
  id-token: write # to enable use of OIDC for npm provenance

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: lts/*
      #     cache: npm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Restore bun cache
        id: restore-bun-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.bun
            !~/.bun/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('.bun-version') }}-${{ hashFiles('bun.lock') }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Store bun cache
        id: store-bun-cache
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.bun
            !~/.bun/cache
          key: ${{ steps.restore-bun-cache.outputs.cache-primary-key }}
        if: steps.restore-bun-cache.outputs.cache-hit != 'true'

      - name: Build
        run: bun run build
      # - name: Release
      #   run: bunx semantic-release
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     NPM_TOKEN: ${{ secrets.PROBOTBOT_NPM_TOKEN }}
