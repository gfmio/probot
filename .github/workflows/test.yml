name: Test
on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Dependency review
        uses: actions/dependency-review-action@v4

  license-check:
    name: Check Licenses
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: lts/*
      #     cache: npm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Restore bun cache
        id: restore-bun-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.bun
            !~/.bun/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('.bun-version') }}-${{ hashFiles('bun.lock') }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Store bun cache
        id: store-bun-cache
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.bun
            !~/.bun/cache
          key: ${{ steps.restore-bun-cache.outputs.cache-primary-key }}
        if: steps.restore-bun-cache.outputs.cache-hit != 'true'

      - name: Check Licenses
        run: bunx license-checker --production --summary --onlyAllow="0BSD;Apache-2.0;Apache 2.0;Python-2.0;BSD-2-Clause;BSD-3-Clause;ISC;MIT"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      # - name: Use Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: lts/*
      #     cache: npm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Restore bun cache
        id: restore-bun-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.bun
            !~/.bun/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('.bun-version') }}-${{ hashFiles('bun.lock') }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Store bun cache
        id: store-bun-cache
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.bun
            !~/.bun/cache
          key: ${{ steps.restore-bun-cache.outputs.cache-primary-key }}
        if: steps.restore-bun-cache.outputs.cache-hit != 'true'

      - name: Lint
        run: bun run lint

  test-unit:
    name: Test on Node ${{ matrix.node-version }} and ${{ matrix.os }}
    strategy:
      matrix:
        node-version:
          - 18
          - 20
          - 22
          - latest
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      # - name: Use Node.js ${{ matrix.node-version }}
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: ${{ matrix.node-version }}
      #     cache: npm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Restore bun cache
        id: restore-bun-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.bun
            !~/.bun/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('.bun-version') }}-${{ hashFiles('bun.lock') }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Store bun cache
        id: store-bun-cache
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.bun
            !~/.bun/cache
          key: ${{ steps.restore-bun-cache.outputs.cache-primary-key }}
        if: steps.restore-bun-cache.outputs.cache-hit != 'true'

      - name: Test
        run: bun run test

  test-redis:
    name: Test on Node LTS and Redis 7
    runs-on: ubuntu-latest
    services:
      redis:
        image: 'redis:7'
        ports:
          - '6379:6379'
        options: '--entrypoint redis-server'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      # - name: Use Node.js LTS
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: lts/*
      #     cache: npm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Restore bun cache
        id: restore-bun-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.bun
            !~/.bun/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('.bun-version') }}-${{ hashFiles('bun.lock') }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Store bun cache
        id: store-bun-cache
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.bun
            !~/.bun/cache
          key: ${{ steps.restore-bun-cache.outputs.cache-primary-key }}
        if: steps.restore-bun-cache.outputs.cache-hit != 'true'

      - name: Test
        run: bun run test
        env:
          REDIS_HOST: 127.0.0.1

  test:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - test-unit
      - test-redis

    steps:
      - run: exit 1
        if: ${{ needs.test-unit.result != 'success' || needs.test-redis.result != 'success' }}
