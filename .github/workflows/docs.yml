name: Docs
on:
  push:
    branches:
      - master
jobs:
  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - run: git fetch --depth=20 origin +refs/tags/*:refs/tags/*

      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: lts/*
      #     cache: npm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Restore bun cache
        id: restore-bun-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.bun
            !~/.bun/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('.bun-version') }}-${{ hashFiles('bun.lock') }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Store bun cache
        id: store-bun-cache
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.bun
            !~/.bun/cache
          key: ${{ steps.restore-bun-cache.outputs.cache-primary-key }}
        if: steps.restore-bun-cache.outputs.cache-hit != 'true'

      - name: Build probot
        run: bun run build
      # - name: Publish documentation
      #   run: ./script/publish-docs
      #   env:
      #     OCTOKITBOT_PAT: ${{ secrets.OCTOKITBOT_PAT }}
